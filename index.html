<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PolskaNewsy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 25px;
    }

    input, select, button {
      padding: 10px;
      margin: 5px 5px 15px 0;
      font-size: 15px;
    }

    button {
      cursor: pointer;
    }

    .stats {
      margin: 20px 0;
      font-weight: bold;
    }

    .article {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border-left: 5px solid #333;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .description {
      margin-bottom: 8px;
    }

    .importance {
      font-weight: bold;
      margin-bottom: 8px;
    }

    a {
      color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>PolskaNewsy</h1>
  <div class="subtitle">Monitoring światowych gazet, think tanków i źródeł strategicznych o Polsce</div>

  <input type="text" id="searchInput" placeholder="Search: NATO, Tusk, economy, Warsaw, EU...">

  <select id="sourceTypeFilter">
    <option value="">All sources</option>
    <option value="Newspaper / Magazine">Newspapers / Magazines</option>
    <option value="Think Tank">Think Tanks</option>
  </select>

  <select id="categoryFilter">
    <option value="">All categories</option>
    <option value="Security">Security</option>
    <option value="Economy">Economy</option>
    <option value="Europe / EU">Europe / EU</option>
    <option value="Politics">Politics</option>
    <option value="Ukraine / Russia / Belarus">Ukraine / Russia / Belarus</option>
    <option value="Migration">Migration</option>
    <option value="Asia / Indo-Pacific">Asia / Indo-Pacific</option>
    <option value="Foreign Policy / Strategy">Foreign Policy / Strategy</option>
    <option value="General Poland">General Poland</option>
  </select>

  <select id="importanceFilter">
    <option value="">All importance levels</option>
    <option value="Very High">Very High</option>
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
  </select>

  <br>

  <button onclick="setDateFilter('all')">All</button>
  <button onclick="setDateFilter('today')">Today</button>
  <button onclick="setDateFilter('7')">Last 7 days</button>
  <button onclick="setDateFilter('30')">Last 30 days</button>

  <br>

  <button onclick="quickSearch('nato')">NATO</button>
  <button onclick="quickSearch('tusk')">Tusk</button>
  <button onclick="quickSearch('sikorski')">Sikorski</button>
  <button onclick="quickSearch('nawrocki')">Nawrocki</button>
  <button onclick="quickSearch('economy')">Economy</button>
  <button onclick="quickSearch('ukraine')">Ukraine</button>
  <button onclick="quickSearch('eu')">EU</button>
  <button onclick="quickSearch('russia')">Russia</button>

  <div class="stats" id="stats">Loading articles...</div>

  <div id="articles"></div>

  <script>
    let allArticles = [];
    let currentDateFilter = "all";

    async function loadArticles() {
      try {
        const response = await fetch("data/articles.json");
        allArticles = await response.json();

        allArticles.sort((a, b) => {
          return (b.importance_score || 0) - (a.importance_score || 0);
        });

        applyFilters();
      } catch (error) {
        document.getElementById("stats").innerText = "Could not load data/articles.json";
        console.error(error);
      }
    }

    function displayArticles(articles) {
      const container = document.getElementById("articles");
      const stats = document.getElementById("stats");

      stats.innerText = "Showing " + articles.length + " articles.";

      container.innerHTML = "";

      if (articles.length === 0) {
        container.innerHTML = "<p>No articles found for this filter.</p>";
        return;
      }

      articles.forEach(article => {
        const div = document.createElement("div");
        div.className = "article";

        const people = Array.isArray(article.people) && article.people.length > 0
          ? article.people.join(", ")
          : "None detected";

        div.innerHTML = `
          <div class="meta">
            ${article.source_type || "Unknown"} |
            ${article.source || "Unknown source"} |
            ${article.source_domain || ""} |
            ${article.category || "No category"} |
            ${formatDate(article.published_at)}
          </div>

          <div class="importance">
            Importance: ${article.importance_label || "Unknown"} 
            (${article.importance_score || 0})
          </div>

          <div class="title">${article.title || "No title"}</div>

          <div class="description">${article.description || ""}</div>

          <div class="meta">
            Keyword: ${article.keyword || "None"} |
            People: ${people}
          </div>

          <a href="${article.url}" target="_blank">Open article</a>
        `;

        container.appendChild(div);
      });
    }

    function applyFilters() {
      const searchText = document.getElementById("searchInput").value.toLowerCase();
      const sourceType = document.getElementById("sourceTypeFilter").value;
      const category = document.getElementById("categoryFilter").value;
      const importance = document.getElementById("importanceFilter").value;

      let filtered = allArticles.filter(article => {
        const peopleText = Array.isArray(article.people) ? article.people.join(" ") : "";

        const fullText = `
          ${article.title || ""}
          ${article.description || ""}
          ${article.source || ""}
          ${article.source_domain || ""}
          ${article.keyword || ""}
          ${article.category || ""}
          ${peopleText}
        `.toLowerCase();

        const matchesSearch = fullText.includes(searchText);
        const matchesSourceType = sourceType === "" || article.source_type === sourceType;
        const matchesCategory = category === "" || article.category === category;
        const matchesImportance = importance === "" || article.importance_label === importance;
        const matchesDate = matchesDateFilter(article);

        return matchesSearch && matchesSourceType && matchesCategory && matchesImportance && matchesDate;
      });

      filtered.sort((a, b) => {
        return (b.importance_score || 0) - (a.importance_score || 0);
      });

      displayArticles(filtered);
    }

    function matchesDateFilter(article) {
      if (currentDateFilter === "all") {
        return true;
      }

      if (!article.published_at) {
        return false;
      }

      const publishedDate = new Date(article.published_at);
      const now = new Date();

      if (isNaN(publishedDate.getTime())) {
        return false;
      }

      const diffMs = now - publishedDate;
      const diffDays = diffMs / (1000 * 60 * 60 * 24);

      if (currentDateFilter === "today") {
        return publishedDate.toISOString().slice(0, 10) === now.toISOString().slice(0, 10);
      }

      if (currentDateFilter === "7") {
        return diffDays <= 7;
      }

      if (currentDateFilter === "30") {
        return diffDays <= 30;
      }

      return true;
    }

    function setDateFilter(filter) {
      currentDateFilter = filter;
      applyFilters();
    }

    function quickSearch(word) {
      document.getElementById("searchInput").value = word;
      applyFilters();
    }

    function formatDate(dateString) {
      if (!dateString) {
        return "No date";
      }

      const date = new Date(dateString);

      if (isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleString();
    }

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("sourceTypeFilter").addEventListener("change", applyFilters);
    document.getElementById("categoryFilter").addEventListener("change", applyFilters);
    document.getElementById("importanceFilter").addEventListener("change", applyFilters);

    loadArticles();
  </script>

</body>
</html>
</html>
