<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PolskaNewsy</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1150px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-bottom: 5px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 25px;
    }

    input, select, button {
      padding: 10px;
      margin: 5px 5px 15px 0;
      font-size: 15px;
    }

    button {
      cursor: pointer;
    }

    .stats {
      margin: 20px 0;
      font-weight: bold;
    }

    .debug {
      margin: 10px 0 20px 0;
      color: #666;
      font-size: 13px;
    }

    .article {
      background: white;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 8px;
      border-left: 5px solid #333;
    }

    .meta {
      color: #666;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .description {
      margin-bottom: 8px;
    }

    a {
      color: #0056b3;
    }
  </style>
</head>

<body>

  <h1>PolskaNewsy</h1>
  <div class="subtitle">Monitoring światowych gazet, think tanków i źródeł strategicznych o Polsce</div>

  <input type="text" id="searchInput" placeholder="Search: NATO, Tusk, economy, Warsaw, EU...">

  <select id="mediaGroupFilter">
    <option value="">All media groups</option>
    <option value="Polish media">Polish media</option>
    <option value="European / Western media">European / Western media</option>
    <option value="Russian / Belarusian media">Russian / Belarusian media</option>
    <option value="Ukrainian media">Ukrainian media</option>
    <option value="Asian media">Asian media</option>
    <option value="Foreign policy / strategy magazines">Foreign policy / strategy magazines</option>
    <option value="Think tanks">Think tanks</option>
    <option value="Other">Other</option>
  </select>

  <select id="categoryFilter">
    <option value="">All topic categories</option>
    <option value="Security">Security</option>
    <option value="Economy">Economy</option>
    <option value="Europe / EU">Europe / EU</option>
    <option value="Politics">Politics</option>
    <option value="Ukraine / Russia / Belarus">Ukraine / Russia / Belarus</option>
    <option value="Migration">Migration</option>
    <option value="Asia / Indo-Pacific">Asia / Indo-Pacific</option>
    <option value="Foreign Policy / Strategy">Foreign Policy / Strategy</option>
    <option value="General Poland">General Poland</option>
    <option value="General">General</option>
  </select>

  <br>

  <button onclick="setDateFilter('all')">All</button>
  <button onclick="setDateFilter('today')">Today</button>
  <button onclick="setDateFilter('7')">Last 7 days</button>
  <button onclick="setDateFilter('30')">Last 30 days</button>
  <button onclick="resetFilters()">Reset filters</button>

  <br>

  <button onclick="quickSearch('nato')">NATO</button>
  <button onclick="quickSearch('tusk')">Tusk</button>
  <button onclick="quickSearch('sikorski')">Sikorski</button>
  <button onclick="quickSearch('nawrocki')">Nawrocki</button>
  <button onclick="quickSearch('bosak')">Bosak</button>
  <button onclick="quickSearch('economy')">Economy</button>
  <button onclick="quickSearch('ukraine')">Ukraine</button>
  <button onclick="quickSearch('eu')">EU</button>
  <button onclick="quickSearch('russia')">Russia</button>
  <button onclick="quickSearch('china')">China</button>

  <div class="stats" id="stats">Loading articles...</div>
  <div class="debug" id="debug"></div>

  <div id="articles"></div>

  <script>
    let allArticles = [];
    let currentDateFilter = "all";

    const POLISH_MEDIA = [
      "dorzeczy.pl",
      "onet.pl"
    ];

    const EUROPEAN_WESTERN_MEDIA = [
      "lemonde.fr",
      "20min.ch",
      "nzz.ch",
      "spiegel.de",
      "bild.de",
      "wsj.com",
      "ft.com",
      "faz.net",
      "faz.de",
      "weltwoche.ch",
      "politico.eu",
      "zerohedge.com",
      "insideparadeplatz.ch",
      "bbc.com"
    ];

    const RUSSIAN_BELARUSIAN_MEDIA = [
      "themoscowtimes.com",
      "kommersant.ru",
      "rbc.ru",
      "vedomosti.ru",
      "novayagazeta.eu",
      "zerkalo.io",
      "charter97.org",
      "belsat.eu",
      "euroradio.fm",
      "reform.news"
    ];

    const UKRAINIAN_MEDIA = [
      "kyivindependent.com",
      "pravda.com.ua",
      "zn.ua",
      "nv.ua",
      "liga.net"
    ];

    const ASIAN_MEDIA = [
      "chinadaily.com.cn",
      "globaltimes.cn",
      "english.news.cn",
      "en.people.cn",
      "scmp.com",
      "japantimes.co.jp",
      "asia.nikkei.com",
      "asahi.com",
      "mainichi.jp",
      "yomiuri.co.jp",
      "channelnewsasia.com",
      "straitstimes.com",
      "businesstimes.com.sg"
    ];

    const FOREIGN_POLICY_MAGAZINES = [
      "foreignaffairs.com",
      "foreignpolicy.com",
      "thefp.com",
      "thediplomat.com",
      "nationalinterest.org",
      "warontherocks.com",
      "worldpoliticsreview.com",
      "geopoliticalmonitor.com",
      "responsiblestatecraft.org",
      "lawfaremedia.org",
      "mondediplo.com"
    ];

    const THINK_TANKS = [
      "csis.org",
      "atlanticcouncil.org",
      "rand.org",
      "cepa.org",
      "heritage.org",
      "carnegieendowment.org",
      "brookings.edu",
      "wilsoncenter.org",
      "cnas.org"
    ];

    async function loadArticles() {
      try {
        const response = await fetch("data/articles.json?cache=" + new Date().getTime());

        if (!response.ok) {
          document.getElementById("stats").innerText = "Could not load data/articles.json";
          document.getElementById("debug").innerText = "HTTP status: " + response.status;
          return;
        }

        const data = await response.json();

        if (!Array.isArray(data)) {
          document.getElementById("stats").innerText = "articles.json is not an array.";
          document.getElementById("debug").innerText = "Check data/articles.json format.";
          return;
        }

        allArticles = data;

        allArticles.sort((a, b) => {
          const dateA = new Date(a.published_at || 0);
          const dateB = new Date(b.published_at || 0);
          return dateB - dateA;
        });

        applyFilters();

      } catch (error) {
        document.getElementById("stats").innerText = "Could not load data/articles.json";
        document.getElementById("debug").innerText = error;
        console.error(error);
      }
    }

    function getDomain(article) {
      if (article.source_domain) {
        return normalizeDomain(article.source_domain);
      }

      if (article.url) {
        try {
          const parsedUrl = new URL(article.url);
          return normalizeDomain(parsedUrl.hostname);
        } catch (error) {
          return "";
        }
      }

      return "";
    }

    function normalizeDomain(domain) {
      domain = (domain || "").toLowerCase().replace("www.", "");

      if (domain.endsWith(".bbc.com")) return "bbc.com";
      if (domain.endsWith(".wsj.com")) return "wsj.com";
      if (domain.endsWith(".ft.com")) return "ft.com";
      if (domain.endsWith(".faz.net")) return "faz.net";
      if (domain.endsWith(".nzz.ch")) return "nzz.ch";

      return domain;
    }

    function getMediaGroup(article) {
      if (article.media_group) {
        return article.media_group;
      }

      const domain = getDomain(article);
      const sourceName = (article.source || "").toLowerCase();
      const sourceType = (article.source_type || "").toLowerCase();

      if (sourceType.includes("think") || THINK_TANKS.includes(domain)) {
        return "Think tanks";
      }

      if (
        POLISH_MEDIA.includes(domain) ||
        sourceName.includes("onet") ||
        sourceName.includes("do rzeczy")
      ) {
        return "Polish media";
      }

      if (RUSSIAN_BELARUSIAN_MEDIA.includes(domain)) {
        return "Russian / Belarusian media";
      }

      if (UKRAINIAN_MEDIA.includes(domain)) {
        return "Ukrainian media";
      }

      if (ASIAN_MEDIA.includes(domain)) {
        return "Asian media";
      }

      if (FOREIGN_POLICY_MAGAZINES.includes(domain)) {
        return "Foreign policy / strategy magazines";
      }

      if (
        EUROPEAN_WESTERN_MEDIA.includes(domain) ||
        sourceName.includes("bbc") ||
        sourceName.includes("politico") ||
        sourceName.includes("wall street journal") ||
        sourceName.includes("financial times") ||
        sourceName.includes("le monde") ||
        sourceName.includes("spiegel") ||
        sourceName.includes("nzz") ||
        sourceName.includes("faz") ||
        sourceName.includes("weltwoche")
      ) {
        return "European / Western media";
      }

      return "Other";
    }

    function displayArticles(articles) {
      const container = document.getElementById("articles");
      const stats = document.getElementById("stats");
      const debug = document.getElementById("debug");

      stats.innerText = "Showing " + articles.length + " articles.";
      debug.innerText = "Loaded total from JSON: " + allArticles.length + " articles. Current date filter: " + currentDateFilter;

      container.innerHTML = "";

      if (articles.length === 0) {
        container.innerHTML = "<p>No articles found for this filter.</p>";
        return;
      }

      articles.forEach(article => {
        const div = document.createElement("div");
        div.className = "article";

        const people = Array.isArray(article.people) && article.people.length > 0
          ? article.people.join(", ")
          : "None detected";

        const mediaGroup = getMediaGroup(article);
        const domain = getDomain(article);

        div.innerHTML = `
          <div class="meta">
            ${mediaGroup} |
            ${article.source || "Unknown source"} |
            ${domain || "No domain"} |
            ${article.category || "No topic category"} |
            ${formatDate(article.published_at)}
          </div>

          <div class="title">${escapeHtml(article.title || "No title")}</div>

          <div class="description">${escapeHtml(article.description || "")}</div>

          <div class="meta">
            Keyword: ${article.keyword || "None"} |
            People: ${people}
          </div>

          <a href="${article.url}" target="_blank">Open article</a>
        `;

        container.appendChild(div);
      });
    }

    function applyFilters() {
      const searchText = document.getElementById("searchInput").value.toLowerCase().trim();
      const mediaGroup = document.getElementById("mediaGroupFilter").value;
      const category = document.getElementById("categoryFilter").value;

      let filtered = allArticles.filter(article => {
        const peopleText = Array.isArray(article.people) ? article.people.join(" ") : "";
        const articleMediaGroup = getMediaGroup(article);
        const domain = getDomain(article);

        const fullText = `
          ${article.title || ""}
          ${article.description || ""}
          ${article.source || ""}
          ${domain || ""}
          ${article.keyword || ""}
          ${article.category || ""}
          ${peopleText}
          ${articleMediaGroup}
        `.toLowerCase();

        const matchesSearch = searchText === "" || fullText.includes(searchText);
        const matchesMediaGroup = mediaGroup === "" || articleMediaGroup === mediaGroup;
        const matchesCategory = category === "" || article.category === category;
        const matchesDate = matchesDateFilter(article);

        return matchesSearch && matchesMediaGroup && matchesCategory && matchesDate;
      });

      filtered.sort((a, b) => {
        const dateA = new Date(a.published_at || 0);
        const dateB = new Date(b.published_at || 0);
        return dateB - dateA;
      });

      displayArticles(filtered);
    }

    function matchesDateFilter(article) {
      if (currentDateFilter === "all") {
        return true;
      }

      if (!article.published_at) {
        return false;
      }

      const publishedDate = new Date(article.published_at);
      const now = new Date();

      if (isNaN(publishedDate.getTime())) {
        return false;
      }

      const diffMs = now - publishedDate;
      const diffDays = diffMs / (1000 * 60 * 60 * 24);

      if (currentDateFilter === "today") {
        return publishedDate.toISOString().slice(0, 10) === now.toISOString().slice(0, 10);
      }

      if (currentDateFilter === "7") {
        return diffDays <= 7;
      }

      if (currentDateFilter === "30") {
        return diffDays <= 30;
      }

      return true;
    }

    function setDateFilter(filter) {
      currentDateFilter = filter;
      applyFilters();
    }

    function quickSearch(word) {
      document.getElementById("searchInput").value = word;
      applyFilters();
    }

    function resetFilters() {
      document.getElementById("searchInput").value = "";
      document.getElementById("mediaGroupFilter").value = "";
      document.getElementById("categoryFilter").value = "";
      currentDateFilter = "all";
      applyFilters();
    }

    function formatDate(dateString) {
      if (!dateString) {
        return "No date";
      }

      const date = new Date(dateString);

      if (isNaN(date.getTime())) {
        return dateString;
      }

      return date.toLocaleString();
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.innerText = text;
      return div.innerHTML;
    }

    document.getElementById("searchInput").addEventListener("input", applyFilters);
    document.getElementById("mediaGroupFilter").addEventListener("change", applyFilters);
    document.getElementById("categoryFilter").addEventListener("change", applyFilters);

    loadArticles();
  </script>

</body>
</html>
